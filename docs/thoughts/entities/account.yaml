# Illustrative manifest. Reflects packages/db/src/client/schema.ts `accounts` table
# and the existing domain layer in packages/integrations/src/domain/crm/.
#
# Lives in: packages/integrations
# Family:   crm

entity:
  name: account
  plural: accounts
  table: accounts
  family: crm
  package: '@repo/integrations'

fields:
  name:               { type: string, required: true, max_length: 255 }
  external_id:        { type: string, required: false, max_length: 255, index: true }
  user_id:            { type: uuid,   required: true,  index: true }
  website:            { type: string, max_length: 255 }
  provider_metadata:  { type: jsonb }

# Industry, employee_count, ARR etc. are EAV fields, same pattern as opportunity.
dynamic_fields:
  industry:        { kind: text,    via: field_values, label: 'Industry' }
  employee_count:  { kind: numeric, via: field_values, label: 'Employees' }
  arr:             { kind: numeric, via: field_values, label: 'ARR' }
  domain:          { kind: text,    via: field_values, label: 'Domain' }   # may also be parseable from website

behaviors:
  - timestamps
  - user_scoped
  - synced_externally

relationships:
  opportunities:
    type: has_many
    target: opportunity
    foreign_key: account_id
    package: '@repo/integrations'
  contacts:
    type: has_many
    target: contact
    via: account_contact                # junction in packages/integrations (newer than opportunity_contact)
    package: '@repo/integrations'
  # Future: parent_account_id self-ref when Account hierarchy lands (named as
  # a Week-1 deliverable in the pre-onboard plan; not yet in schema).

queries:
  - by: [user_id]
    order: name asc
  - by: [external_id]
    unique: true
  - by: [website]

dimensions:
  - name
  - website
  - dynamic.industry
  - dynamic.domain
  - created_at: { granularity: [day, week, month] }

measures:
  - count
  - opportunity_count:    { from: opportunities.count }
  - sum_opportunity_amount: { from: opportunities.sum_amount }
