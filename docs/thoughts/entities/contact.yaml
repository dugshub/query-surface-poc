# Illustrative manifest. Reflects packages/db/src/server/schema.ts `contacts` table
# and the existing domain layer in packages/integrations/src/domain/crm/.
#
# Lives in: packages/integrations
# Family:   crm

entity:
  name: contact
  plural: contacts
  table: contacts
  family: crm
  package: '@repo/integrations'

fields:
  first_name:         { type: string, max_length: 100 }
  last_name:          { type: string, max_length: 100 }
  email:              { type: string, max_length: 255, index: true }
  external_id:        { type: string, max_length: 255, index: true }
  user_id:            { type: uuid,   required: true,  index: true }
  provider_metadata:  { type: jsonb }

# Title, role, seniority, etc. live in field_values.
dynamic_fields:
  title:        { kind: text, via: field_values, label: 'Title' }
  role:         { kind: text, via: field_values, label: 'Role' }
  seniority:    { kind: text, via: field_values, label: 'Seniority' }

behaviors:
  - timestamps
  - user_scoped
  - synced_externally

relationships:
  accounts:
    type: has_many
    target: account
    via: account_contact                # NEW junction added with HCRM-5 migration
    package: '@repo/integrations'
  opportunities:
    type: has_many
    target: opportunity
    via: opportunity_contact
    package: '@repo/integrations'
  # Email / activity links would join via shared email field, not a junction —
  # these are agent-driven joins via emails.from_email or attendee jsonb.
  # The manifest layer would need a `derived_relationship` shape for that —
  # noted but out of scope for the v1 primitive.

queries:
  - by: [email]
    unique: true
  - by: [user_id]
    order: last_name asc
  - by: [external_id]
    unique: true

dimensions:
  - email
  - dynamic.title
  - dynamic.role
  - dynamic.seniority
  - accounts.name                       # multi-account expansion: which account context

measures:
  - count
  - opportunities_count:  { from: opportunities.count }
