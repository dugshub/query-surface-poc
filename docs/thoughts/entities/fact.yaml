# Illustrative manifest. Reflects packages/db/src/client/schema.ts `facts` table
# and the existing repository in apps/backend/src/infrastructure/database/repositories/fact.repository.ts.
#
# Lives in: apps/backend
# Family:   knowledge   (lifecycle-aware substantive content, extracted from artifacts)
#
# Fact is the trickiest entity to model under this taxonomy. It's not synced (it's
# extracted), not pure metadata (it has substantive textual content), not a
# time-based event itself (it's about WHAT was said, not WHEN a meeting happened).
# The `knowledge` family captures: lifecycle (active/historical/retracted with
# successor chain), confidence scoring, source provenance — all of which are
# native concerns of this family's base class.

entity:
  name: fact
  plural: facts
  table: facts
  family: knowledge
  package: '@apps/backend'

fields:
  artifact_id:           { type: uuid, required: true, index: true }     # FK → artifacts
  statement:             { type: text, required: true }
  confidence:            { type: float, required: true }
  source_quote:          { type: text, required: true }
  valid_from:            { type: timestamp }
  valid_until:           { type: timestamp }
  temporal_type:         { type: enum, choices: [point_in_time, ongoing, historical, future] }

  # Lifecycle — the differentiating fact-engine concern. Codes are public-readable;
  # the registrar maps to compact storage codes at the boundary (see fact.entity.ts).
  status:                { type: enum, choices: [active, historical, retracted], index: true }
  status_changed_at:     { type: timestamp }
  status_reason:         { type: text }
  successor_fact_id:     { type: uuid }                                  # chain to replacement

# Classification and speaker_role live as separate columns (fact_entity_*) OR via
# join — confirmed in the schema but elided here for brevity. The manifest is
# illustrative; the build spec resolves the exact column/join shape.
derived_fields:
  classification:    { kind: enum, via: fact_classification, label: 'Classification' }
                                                                          # pain_point / risk / objection / etc.
  speaker_role:      { kind: enum, via: fact_speaker, label: 'Speaker Role' }
                                                                          # seller / buyer / assistant

behaviors:
  - timestamps
  - org_scoped: via artifact.organization_id
                                                                          # facts are not directly tenant-scoped;
                                                                          # they inherit via artifact
  - lifecycle_aware                                                       # ships from knowledge family base

relationships:
  source_artifact:
    type: belongs_to
    target: artifact
    foreign_key: artifact_id
  opportunity:                                                            # via artifact
    type: has_one
    target: opportunity
    via: artifact
    cross_package: true                                                   # reaches @repo/integrations
  meeting:                                                                # via artifact (when artifact is a transcript)
    type: has_one
    target: meeting
    via: artifact
  successor:
    type: belongs_to
    target: fact
    foreign_key: successor_fact_id
  predecessors:
    type: has_many
    target: fact
    foreign_key: successor_fact_id

queries:
  - by: [artifact_id, status]
    order: created_at desc
  - by: [status, classification]
    order: created_at desc
  # Active-only retrieval (the most common shape) is a default the lifecycle_aware
  # behavior installs at the repository level, NOT a query the user redeclares.

# Default filter: active facts only, unless the caller opts into history.
# Matches the current `search_deal_context` default behavior.
default_filters:
  status: active

dimensions:
  - status
  - derived.classification
  - derived.speaker_role
  - source_artifact.type
  - source_artifact.occurred_at: { granularity: [day, week, month] }
  - opportunity.dynamic.stage                                             # cross-package + EAV
  - opportunity.account.dynamic.industry

measures:
  - count
  - distinct_artifact_count:  { distinct: artifact_id }
  - avg_confidence:           { agg: avg, on: confidence }
