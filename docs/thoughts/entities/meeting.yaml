# Illustrative manifest. Reflects packages/db/src/client/schema.ts `meetings` table
# and the existing repository in apps/backend/src/infrastructure/database/repositories/meeting.repository.ts.
#
# Lives in: apps/backend  (meeting is an app-layer entity, not CRM-domain)
# Family:   activity      (time-based event with a transcript artifact attached)
#
# This manifest demonstrates the CROSS-PACKAGE relationship case:
# meeting → opportunity reaches across into @repo/integrations.

entity:
  name: meeting
  plural: meetings
  table: meetings
  family: activity
  package: '@apps/backend'

fields:
  user_id:            { type: uuid,    required: true,  index: true }
  title:              { type: string,  required: true,  max_length: 255 }
  description:        { type: text }
  start_time:         { type: timestamp, required: true, index: true }
  end_time:           { type: timestamp, required: true }
  is_all_day:         { type: boolean,   required: true, default: false }
  status:             { type: enum, choices: [scheduled, completed, cancelled] }
  attendees:          { type: jsonb }    # Array<{ email, responseStatus?, displayName? }>
  organizer:          { type: jsonb }    # { email, displayName? }
  meeting_link:       { type: string, max_length: 512 }
  occurred_at:        { type: timestamp, required: true, index: true }

behaviors:
  - timestamps
  - user_scoped                          # meetings are user_id-scoped, NOT organization_id-scoped
                                         # (different tenancy from opportunity — manifest captures both)

relationships:
  opportunity:                           # CROSS-PACKAGE — opportunity lives in @repo/integrations
    type: has_one
    target: opportunity
    via: opportunity_meetings            # junction table in apps/backend
    cross_package: true
  artifact:                              # the meeting transcript (if available)
    type: has_one
    target: artifact
    foreign_key: source_meeting_id       # via artifact's source link
    on: artifact
  facts:                                 # facts extracted from the transcript
    type: has_many
    target: fact
    via: artifact                        # two-hop: meeting → artifact → fact
  action_items:                          # action items extracted from this meeting
    type: has_many
    target: action_item
    via: artifact

queries:
  - by: [user_id, occurred_at]
    order: occurred_at desc
  - by: [user_id, status]
    order: occurred_at desc
  - by: [opportunity_id]                 # via junction; codegen resolves
    order: occurred_at desc

# Inductive bias for the agent — defaults that reflect what sellers actually want
# (mirrors the heuristics already in list_meetings: hide focus blocks, OOO, etc.)
default_filters:
  hide_solo_events: true                 # filter where attendees.length > 1
  hide_focus_blocks: true                # filter where event type indicates focus
  hide_ooo: true

dimensions:
  - status
  - occurred_at:           { granularity: [day, week, month] }
  - opportunity.dynamic.stage            # cross-package + cross-EAV — the hard case
  - opportunity.account.name
  - opportunity.account.dynamic.industry

measures:
  - count
  - avg_duration_min:      { from: end_time, since: start_time }
  - p50_duration_min:      { from: end_time, since: start_time, agg: percentile_50 }
