# Illustrative manifest for the uniform-query-surface proposal.
# Not a build spec. Reflects the actual schema in packages/db/src/server/schema.ts
# and the existing domain layer in packages/integrations/src/domain/crm/.
#
# Lives in: packages/integrations  (CRM domain belongs to the package, not the backend)
# Family:   crm   (renamed from `synced` — "crm" describes the domain role, not the
#                  ingestion mechanism. All integration data is synced; what matters
#                  is what KIND of thing it is.)

entity:
  name: opportunity
  plural: opportunities
  table: opportunities
  family: crm
  package: '@repo/integrations'        # the package boundary the manifest declares

fields:
  # Columns that exist as real Drizzle table columns today.
  name:                  { type: string,  required: true, max_length: 255 }
  external_id:           { type: string,  required: false, max_length: 255, index: true }
  user_id:               { type: uuid,    required: true,  index: true }        # primary owner
  organization_id:       { type: uuid,    required: false, index: true }        # tenant
  account_id:            { type: uuid,    required: false }                     # FK → accounts
  record_type_id:        { type: uuid,    required: false }                     # FK → record_types
  parent_opportunity_id: { type: uuid,    required: false }                     # self-ref (renewal chain)
  is_visible:            { type: boolean, default: false }
  state_of_deal:         { type: text }
  state_of_deal_status:  { type: enum,    choices: [pending, generating, ready, stale, error] }
  email_domains:         { type: string_array }                                 # jsonb<string[]>
  provider_metadata:     { type: jsonb }

# IMPORTANT: stage / amount / close_date / owner_id are NOT columns on this table.
# They live in `field_values` (EAV) keyed by record_type_id + field_id.
# The manifest resolver needs to know how to compile `filter on: stage` into
# the appropriate join through field_values + fields + record_types.
# Listed here as dynamic_fields so dimensions/filters can reference them.
dynamic_fields:                                                                  # opt-in EAV bridge
  stage:       { kind: text,    via: field_values, label: 'Stage' }
  amount:      { kind: numeric, via: field_values, label: 'Amount' }
  close_date:  { kind: date,    via: field_values, label: 'Close Date' }
  owner_id:    { kind: uuid,    via: field_values, label: 'Owner' }

behaviors:
  - timestamps                          # created_at, updated_at (already present)
  - org_scoped                          # filter via organization_id when set
  - user_scoped                         # fallback filter via user_id
  - synced_externally                   # has external_id + provider_metadata; sync subsystem owns writes

relationships:
  account:
    type: belongs_to
    target: account
    foreign_key: account_id
    package: '@repo/integrations'
  contacts:
    type: has_many
    target: contact
    via: opportunity_contact            # junction in packages/integrations
    package: '@repo/integrations'
  meetings:
    type: has_many
    target: meeting
    via: opportunity_meetings           # junction in apps/backend — CROSS-PACKAGE
    package: '@repo/integrations'      # owning side; the junction lives in backend
    cross_package: true                 # the resolver knows this requires reaching into backend repos
  artifacts:
    type: has_many
    target: artifact
    via: artifact_opportunity_links     # junction in apps/backend
    cross_package: true
  facts:
    type: has_many
    target: fact
    via: artifacts                      # facts → artifact → opportunity (two-hop)
    cross_package: true
  action_items:
    type: has_many
    target: action_item
    foreign_key: opportunity_id
    cross_package: true
  updates:
    type: has_many
    target: opportunity_update
    foreign_key: opportunity_id
    cross_package: true
  parent:
    type: belongs_to
    target: opportunity
    foreign_key: parent_opportunity_id  # self-ref for renewal chains
  renewals:
    type: has_many
    target: opportunity
    foreign_key: parent_opportunity_id

queries:                                # codegen would emit typed repo methods + use cases
  - by: [user_id, is_visible]
    order: created_at desc
  - by: [account_id]
    order: created_at desc
  - by: [external_id]
    unique: true
  - by: [parent_opportunity_id]

dimensions:                             # exposed to Cube + to filter joins
  - state_of_deal_status
  - is_visible
  - account.name
  - dynamic.stage
  - dynamic.owner_id
  - dynamic.close_date: { granularity: [day, week, month, quarter] }
  - created_at:         { granularity: [day, week, month] }

measures:
  - count
  - sum_amount:         { source: dynamic.amount }      # sums the EAV-resolved amount
  - avg_amount:         { source: dynamic.amount }
  - avg_cycle_days:     { from: created_at, to: dynamic.close_date }
