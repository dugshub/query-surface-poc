# Account — top-level CRM entity. Mirrors dealbrain's accounts table shape.
#
# Differences from dealbrain production:
# - userId here is a free-floating uuid (no users table in the POC)
# - organizationId is a loose uuid (no organizations table in the POC)
# - No soft_delete (dealbrain doesn't soft-delete either)

entity:
  name: account
  plural: accounts
  table: accounts
  pattern: Synced

fields:
  user_id:
    type: uuid
    required: true
    index: true

  organization_id:
    type: uuid
    nullable: true
    index: true

  external_id:
    type: string
    nullable: true
    max_length: 255
    index: true

  name:
    type: string
    required: true
    max_length: 255

  website:
    type: string
    nullable: true
    max_length: 255

  provider_metadata:
    type: json
    nullable: true

behaviors:
  - timestamps

queries:
  - by: [user_id]
    order: name asc
  - by: [external_id]
    unique: true
