# TranscriptChunk — searchable unit of a transcript. Base pattern (no family fit;
# Knowledge would be ideal but it's an empty stub today).
#
# Chunks are the architectural insight: WITHIN search = filter chunks of a known
# transcript_id; ACROSS search = filter transcripts where ANY child chunk matches.
# Same query_domain primitive, different root entity.

entity:
  name: transcript_chunk
  plural: transcript_chunks
  table: transcript_chunks
  pattern: Base

fields:
  transcript_id:
    type: uuid
    required: true
    index: true

  position:
    type: integer
    required: true             # 0-indexed order within the transcript

  speaker:
    type: enum
    choices: [seller, buyer, unknown]
    nullable: true

  body:
    type: string
    required: true

  starts_at_sec:
    type: integer               # seconds from transcript start
    nullable: true

  ends_at_sec:
    type: integer
    nullable: true

behaviors:
  - timestamps

relationships:
  transcript:
    type: belongs_to
    target: transcript
    foreign_key: transcript_id
    on_delete: cascade

queries:
  - by: [transcript_id]
    order: position asc
  - name: search                # emits SearchTranscriptChunksUseCase with ILIKE on body
    search: body
    filters: [transcript_id, speaker]
    order: position asc
    paginate: true
